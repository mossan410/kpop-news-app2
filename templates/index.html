<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KPOP News</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
margin:0;
}

header{
position:fixed;
top:0;
width:100%;
background:black;
padding:15px 30px;
font-size:26px;
font-weight:bold;
z-index:1000;
}

.container{
margin-top:80px;
}

.filter{
margin:20px 30px;
}

.group{
margin:40px 30px;
}

.group-title{
font-size:22px;
margin-bottom:15px;
}

.news-row{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
}

.news-row::-webkit-scrollbar{
display:none;
}

.card{
background:#222;
width:240px;
margin-right:15px;
border-radius:6px;
transition:0.3s;
flex-shrink:0;
}

.card:hover{
transform:scale(1.1);
z-index:5;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:6px 6px 0 0;
}

.card-body{
padding:10px;
}

.title{
font-size:15px;
margin-bottom:5px;
}

.date{
font-size:12px;
color:#aaa;
}

a{
text-decoration:none;
color:white;
}

.favorite{
color:gold;
font-size:18px;
cursor:pointer;
}

button{
padding:6px 12px;
margin-top:5px;
}

@media (max-width:600px){

.card{
width:180px;
}

header{
font-size:22px;
}

}

</style>

</head>


<body>

<header>

KPOP NEWS

</header>


<div class="container">

<div class="filter">

<form method="get">

<h3>表示グループ</h3>

{% for g in group_names %}

<label>

<input
type="checkbox"
name="group"
value="{{g}}"

{% if g in selected_groups %}
checked
{% endif %}
>

{{g}}

</label>

{% endfor %}

<br>

<button type="submit">表示</button>

</form>

</div>


{% for group, items in groups.items() %}

<div class="group">

<div class="group-title">

⭐ {{group}}

</div>


<div class="news-row">

{% for news in items %}

<div class="card">

<a href="{{news[3]}}" target="_blank">

<img src="{{news[4]}}">

<div class="card-body">

<div class="title">

{{news[2]}}

</div>

<div class="date">

{{news[0]}}

</div>

</a>

<div
class="favorite"
onclick="saveFavorite('{{news[2]}}','{{news[3]}}')"
>

★ お気に入り

</div>

</div>

</div>

{% endfor %}

</div>

</div>

{% endfor %}

</div>


<script>

function saveFavorite(title,link){

let fav = JSON.parse(localStorage.getItem("favorites") || "[]")

fav.push({
title:title,
link:link
})

localStorage.setItem("favorites",JSON.stringify(fav))

alert("お気に入りに追加しました")

}

</script>

</body>

</html>
